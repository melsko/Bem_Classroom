name: CI
on: [push]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x scripts/check.sh
      - run: ./scripts/check.sh
      - run: echo "Pipeline works!"
      - name: Build Docker image
        run: docker build -t bem-app:${{ github.sha }} .
